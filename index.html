<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2334;
    --border: #2a3047;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4e5a6e;
    --accent: #4f8ef7;
    --accent2: #7c5af0;

    --신: #4f8ef7;
    --신-bg: rgba(79,142,247,0.12);
    --추: #7c5af0;
    --추-bg: rgba(124,90,240,0.12);
    --요: #f0b429;
    --요-bg: rgba(240,180,41,0.12);
    --기: #2ecc71;
    --기-bg: rgba(46,204,113,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
  .app-title span { color: var(--accent); }
  .gs-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text2);
  }
  .gs-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--기); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Tab Panels ── */
  .tab-panel { display: none; padding: 28px 32px; }
  .tab-panel.active { display: block; }

  /* ── Section titles ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* ── KPI Row ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .kpi-label { font-size: 11px; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.05em; }
  .kpi-value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* ── Chart Area ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
    margin-bottom: 28px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
  }
  .chart-title { font-size: 13px; font-weight: 600; }

  .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 200px; }
  .bar-group {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%;
  }
  .bar-wrap { flex: 1; display: flex; align-items: flex-end; width: 100%; justify-content: center; }
  .bar {
    width: 100%; max-width: 52px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 4px 4px 0 0;
    position: relative;
    min-height: 4px;
    transition: opacity .2s;
    cursor: default;
  }
  .bar:hover { opacity: .85; }
  .bar-amount {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-family: 'DM Mono', monospace; white-space: nowrap; color: var(--text2);
  }
  .bar-label { font-size: 11px; color: var(--text3); }

  /* Legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Calendar Section ── */
  .month-nav {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .month-btn {
    padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .cal-header-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cal-month-title { font-size: 18px; font-weight: 700; }
  .cal-month-total { font-size: 13px; color: var(--text2); }
  .cal-month-total strong { color: var(--text); font-family: 'DM Mono', monospace; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr) 120px;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .cal-head {
    background: var(--surface2);
    padding: 8px 4px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.06em;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .cal-head:last-child { color: var(--accent2); }

  .cal-cell {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 6px;
    min-height: 80px;
    vertical-align: top;
    position: relative;
  }
  .cal-cell:last-child { border-right: none; }
  .cal-cell.empty { background: var(--bg); }
  .cal-cell.today { background: rgba(79,142,247,0.05); }

  .cal-date {
    font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px;
  }
  .cal-cell.sun .cal-date { color: #f56565; }
  .cal-cell.sat .cal-date { color: var(--accent); }

  .event-badge {
    display: flex; align-items: flex-start; gap: 4px;
    padding: 3px 5px; border-radius: 4px; margin-bottom: 3px;
    font-size: 10px; line-height: 1.3;
  }
  .badge-circle {
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
    margin-top: 1px;
  }
  .badge-신 { background: var(--신-bg); }
  .badge-circle-신 { background: var(--신); color: #fff; }
  .badge-추 { background: var(--추-bg); }
  .badge-circle-추 { background: var(--추); color: #fff; }
  .badge-요 { background: var(--요-bg); }
  .badge-circle-요 { background: var(--요); color: #000; }
  .badge-기 { background: var(--기-bg); }
  .badge-circle-기 { background: var(--기); color: #fff; }

  .badge-info { display: flex; flex-direction: column; gap: 1px; }
  .badge-product { color: var(--text); font-weight: 500; font-size: 9.5px; }
  .badge-qty { color: var(--text2); font-size: 9px; }
  .badge-cost { color: var(--text); font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; }

  .badge-memo {
    margin-top: 2px;
    padding: 2px 4px;
    background: rgba(255,255,255,0.04);
    border-left: 2px solid var(--accent2);
    border-radius: 0 3px 3px 0;
    font-size: 8.5px;
    color: var(--text2);
    line-height: 1.4;
    word-break: keep-all;
  }

  /* Week cost column */
  .week-cost-cell {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
    font-family: 'DM Mono', monospace;
  }
  .week-cost-label { font-size: 9px; color: var(--text3); margin-bottom: 3px; }
  .week-cost-value { font-size: 13px; font-weight: 600; color: var(--text); }
  .week-cost-head {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    text-align: right;
    font-size: 10px; font-weight: 600; color: var(--accent2);
    letter-spacing: 0.06em;
  }

  /* ── Google Sheets Config ── */
  .gs-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 22px;
  }
  .gs-config-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
  .gs-input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .gs-input {
    flex: 1; min-width: 260px;
    padding: 9px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color .2s;
  }
  .gs-input:focus { border-color: var(--accent); }
  .gs-btn {
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .gs-btn:hover { opacity: .85; }
  .gs-hint { font-size: 11px; color: var(--text3); margin-top: 8px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Overview tab ── */
  .product-table {
    width: 100%; border-collapse: collapse;
    background: var(--surface);
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .product-table th {
    padding: 10px 16px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--text3);
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .product-table td {
    padding: 11px 16px; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .product-table tr:last-child td { border-bottom: none; }
  .product-table tr:hover td { background: var(--surface2); }
  .mono { font-family: 'DM Mono', monospace; }
</style>
</head>

// ──────────────────────────── FORMAT ────────────────────────────
function fmtAmount(v) {
  if (!v) return null;
  if (v >= 100000000) {
    return (v / 100000000).toFixed(1) + '억';
  } else if (v >= 10000000) {
    return (v / 10000000).toFixed(1) + '천만';
  } else if (v >= 1000000) {
    return (v / 1000000).toFixed(1) + '백만';
  } else if (v >= 10000) {
    return Math.round(v / 10000) + '만';
  }
  return v.toLocaleString() + '원';
}

function fmtAmountFull(v) {
  if (!v) return '—';
  return '₩' + v.toLocaleString();
}

// ──────────────────────────── PARSE ────────────────────────────
function parseRow(row) {
  // row: {date, type, product, qty, amount, note}
  if (!row.date || !row.type || !row.product) return null;
  const parts = String(row.date).split('/');
  if (parts.length < 2) return null;
  const m = parseInt(parts[0]);
  const d = parseInt(parts[1]);
  if (isNaN(m) || isNaN(d)) return null;
  const t = String(row.type).trim();
  if (!['신','추','요','기'].includes(t)) return null;
  return {
    month: m, day: d,
    type: t,
    product: String(row.product).trim(),
    qty: row.qty ? parseInt(row.qty) : null,
    amount: row.amount ? parseInt(String(row.amount).replace(/[₩,]/g,'')) : null,
    note: row.note || '',
    memo: row.memo || ''
  };
}

// ──────────────────────────── GOOGLE SHEETS ────────────────────────────
async function connectSheet() {
  const id = '1p-ko7c4--yUwYOYE2fL8X6Z1U3O1lWoJ36AZuBanGmQ';
  const sheetName = '타임라인';

  setStatus('연결 중…', '#f0b429');
  try {
    // Use CSV export URL (public sheet)
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('응답 오류: ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('데이터가 없습니다.');
    const header = rows[0].map(h => String(h).trim().toLowerCase());
    const data = rows.slice(1).map(row => {
      const obj = {};
      header.forEach((h, i) => { obj[h] = row[i] || ''; });
      // Map Korean headers
      return {
        date: obj['날짜'] || obj['date'] || '',
        type: obj['유형'] || obj['type'] || '',
        product: obj['제품명'] || obj['product'] || '',
        qty: obj['수량'] || obj['qty'] || '',
        amount: obj['금액'] || obj['amount'] || '',
        note: obj['비고'] || obj['note'] || '',
        memo: obj['협의사항'] || obj['memo'] || ''
      };
    });
    const parsed = data.map(parseRow).filter(Boolean);
    if (!parsed.length) throw new Error('파싱 가능한 데이터가 없습니다.');
    currentData = parsed;
    setStatus('연결됨 · ' + parsed.length + '건', '#2ecc71');
    renderAll();
  } catch(e) {
    setStatus('연결 실패: ' + e.message, '#f56565');
    alert('Google Sheets 연동 실패: ' + e.message + '\n\n※ 스프레드시트가 "링크가 있는 모든 사용자에게 공개"로 설정되어 있는지 확인해주세요.');
  }
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      if (text[i] === '"') {
        let cell = '';
        i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { cell += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { cell += text[i++]; }
        }
        row.push(cell);
        if (text[i] === ',') i++;
      } else {
        let cell = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') { cell += text[i++]; }
        row.push(cell.trim());
        if (text[i] === ',') i++;
      }
    }
    if (text[i] === '\n') i++;
    if (row.some(c => c)) rows.push(row);
  }
  return rows;
}

  const html = monthlyTotals.map(mo => `
    <div class="bar-group">

    byDay[r.day].push(r);
  });

  // First day of month (2026)

  const days = moInfo.days;
  const DAYS = ['일','월','화','수','목','금','토'];

  let calHtml = `
    <div class="cal-header-row">
      <div class="cal-month-title">2026년 ${moInfo.label}</div>

    </div>
    <div class="calendar-grid">
  `;

  // Header row (7 days + week cost)
  DAYS.forEach(d => {
    calHtml += `<div class="cal-head">${d}</div>`;
  });
  calHtml += `<div class="cal-head week-cost-head">주간 합계</div>`;

  // Cells
  for (let week = 0; week < numWeeks; week++) {
    let weekCost = 0;

    for (let dow = 0; dow < 7; dow++) {
      const cellIdx = week * 7 + dow;
      const dayNum = cellIdx - firstDow + 1;

      if (dayNum < 1 || dayNum > days) {
        calHtml += `<div class="cal-cell empty"></div>`;
        continue;
      }

      const events = byDay[dayNum] || [];
      events.forEach(e => { weekCost += (e.amount || 0); });

      let evHtml = events.map(e => `
        <div class="event-badge badge-${e.type}" title="${e.note}">
          <div class="badge-circle badge-circle-${e.type}">${e.type}</div>
          <div class="badge-info">
            <div class="badge-product">${e.product}</div>
            ${e.qty ? `<div class="badge-qty">${e.qty.toLocaleString()}개</div>` : ''}
            ${e.amount ? `<div class="badge-cost">${fmtAmount(e.amount)}</div>` : ''}
            ${e.memo ? `<div class="badge-memo">💬 ${e.memo}</div>` : ''}
          </div>
        </div>
      `).join('');

      const dayClass = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
      calHtml += `
        <div class="cal-cell ${dayClass}">
          <div class="cal-date">${dayNum}</div>
          ${evHtml}
        </div>
      `;
    }

    // Week cost column
    calHtml += `
      <div class="week-cost-cell">
        <div class="week-cost-label">${week+1}주차</div>
        <div class="week-cost-value">${weekCost ? fmtAmount(weekCost) : '—'}</div>
      </div>
    `;
  }

  calHtml += `</div>`;
  document.getElementById('calendarArea').innerHTML = calHtml;
}

// ──────────────────────────── OVERVIEW TAB ────────────────────────────
function renderOverview() {
  if (!currentData.length) return;

  const rows = [];

  MONTHS.forEach(mo => {
    const monthData = currentData.filter(r => r.month === mo.m);
    if (!monthData.length) return;

    const firstDate = new Date(2026, mo.m - 1, 1);
    const firstDow = firstDate.getDay();
    const days = mo.days;
    const totalCells = firstDow + days;
    const numWeeks = Math.ceil(totalCells / 7);

    let monthTotal = 0;

    for (let week = 0; week < numWeeks; week++) {
      const startDay = week * 7 - firstDow + 1;
      const endDay = startDay + 6;

      const clampedStart = Math.max(1, startDay);
      const clampedEnd = Math.min(days, endDay);
      if (clampedStart > days) continue;

      const weekData = monthData.filter(r => r.day >= clampedStart && r.day <= clampedEnd);
      const 기amt = weekData.filter(r=>r.type==='기').reduce((s,r)=>s+(r.amount||0),0);
      const 신amt = weekData.filter(r=>r.type==='신').reduce((s,r)=>s+(r.amount||0),0);
      const 추amt = weekData.filter(r=>r.type==='추').reduce((s,r)=>s+(r.amount||0),0);
      const total = 기amt + 신amt + 추amt;
      monthTotal += total;

      rows.push({
        month: mo.label,
        week: week + 1,
        range: `${clampedStart}일 – ${clampedEnd}일`,
        기: 기amt,
        신: 신amt,
        추: 추amt,
        total,
        isLast: week === numWeeks - 1,
        monthTotal: 0 // fill after
      });
    }

    // 월 합계 행에 monthTotal 기록
    const monthRows = rows.filter(r => r.month === mo.label);
    monthRows.forEach(r => r.monthTotal = monthTotal);
  });

  // 월별로 그룹핑해서 렌더
  let html = '';
  let lastMonth = '';
  rows.forEach((r, i) => {
    const isNewMonth = r.month !== lastMonth;
    lastMonth = r.month;

    html += `
      <tr style="${isNewMonth ? 'border-top:2px solid var(--border)' : ''}">
        ${isNewMonth ? `<td rowspan="${rows.filter(x=>x.month===r.month).length + 1}" style="font-weight:700;font-size:13px;text-align:center;vertical-align:top;padding-top:14px;border-right:1px solid var(--border);">${r.month}</td>` : ''}
        <td style="color:var(--text2)">${r.week}주차</td>
        <td style="color:var(--text3);font-size:11px;">${r.range}</td>
        <td class="mono" style="color:var(--기)">${r.기 ? fmtAmountFull(r.기) : '—'}</td>
        <td class="mono" style="color:var(--신)">${r.신 ? fmtAmountFull(r.신) : '—'}</td>
        <td class="mono" style="color:var(--추)">${r.추 ? fmtAmountFull(r.추) : '—'}</td>
        <td class="mono" style="font-weight:600">${r.total ? fmtAmountFull(r.total) : '—'}</td>
      </tr>
    `;

    // 월 합계 행
    if (r.isLast) {
      html += `
        <tr style="background:var(--surface2);">
          <td colspan="3" style="text-align:right;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:0.05em;">월 합계</td>
          <td class="mono" style="color:var(--기);font-weight:700;">${rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.기,0) ? fmtAmountFull(rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.기,0)) : '—'}</td>
          <td class="mono" style="color:var(--신);font-weight:700;">${rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.신,0) ? fmtAmountFull(rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.신,0)) : '—'}</td>
          <td class="mono" style="color:var(--추);font-weight:700;">${rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.추,0) ? fmtAmountFull(rows.filter(x=>x.month===r.month).reduce((s,x)=>s+x.추,0)) : '—'}</td>
          <td class="mono" style="font-weight:700;color:var(--accent);">${fmtAmountFull(r.monthTotal)}</td>
        </tr>
      `;
    }
  });

  document.getElementById('weeklyTableBody').innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px;">데이터 없음</td></tr>';
}

connectSheet();
