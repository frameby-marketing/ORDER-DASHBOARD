<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발주 관리 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   style.css — 발주 관리 대시보드
   Theme: dark industrial / monospace data terminal
   ============================================================ */
:root {
  --bg:     #0d0f12;
  --bg2:    #13161b;
  --bg3:    #1a1e26;
  --border: rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:   #e2e8f0;
  --muted:  #64748b;
  --accent: #38bdf8;
  --green:  #22c55e;
  --red:    #ef4444;
  --amber:  #f59e0b;
  --blue:   #3b82f6;
  --purple: #8b5cf6;
  --pink:   #ec4899;
  --sidebar-w: 200px;
  --mono: 'DM Mono', monospace;
  --sans: 'Pretendard', -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
/* ── LAYOUT ────────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }
/* ── SIDEBAR ───────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 0.5rem;
}
.logo { display: flex; align-items: center; gap: 10px; padding: 0 0.5rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
.logo-mark { font-size: 20px; color: var(--accent); line-height: 1; }
.logo-text { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; letter-spacing: 0.04em; }
.nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 6px; border: none; background: transparent;
  color: var(--muted); font-family: var(--sans); font-size: 13px;
  cursor: pointer; transition: all 0.15s; text-align: left;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--accent); }
.sync-status { display: flex; align-items: center; gap: 7px; padding: 8px 10px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sync-dot.sync-ok      { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.sync-loading { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.sync-error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.refresh-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px; border-radius: 6px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); font-size: 12px; font-family: var(--sans);
  cursor: pointer; transition: all 0.15s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
/* ── MAIN ──────────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; }
.panel { display: none; }
.panel.on { display: block; }
/* ── PAGE HEADER ───────────────────────────────────────── */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
.page-title { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.page-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }
.period-badge { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 4px; color: var(--muted); white-space: nowrap; }
/* ── SECTIONS ──────────────────────────────────────────── */
.sec { margin-bottom: 1.5rem; }
.sec-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
.sec-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
.sec-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
/* ── KPI ROW ───────────────────────────────────────────── */
.kpi-row { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 10px; }
.kpi-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.1rem 1.25rem;
}
.kpi-wide { grid-column: span 1; }
.kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.kpi-label-sub { color: var(--muted); opacity: 0.7; margin-left: 4px; }
.kpi-value { font-size: 24px; font-weight: 600; font-family: var(--mono); color: var(--text); letter-spacing: -0.02em; margin-bottom: 6px; }
.kpi-value.pos { color: var(--green); }
.kpi-value.neg { color: var(--red); }
.kpi-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.kpi-footer { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 10px; }
/* ── BADGE ─────────────────────────────────────────────── */
.kpi-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; }
.kpi-badge-green  { background: rgba(34,197,94,0.12);  color: var(--green); }
.kpi-badge-red    { background: rgba(239,68,68,0.12);  color: var(--red); }
.kpi-badge-amber  { background: rgba(245,158,11,0.12); color: var(--amber); }
.kpi-badge-blue   { background: rgba(59,130,246,0.12); color: var(--blue); }
.kpi-badge-purple { background: rgba(139,92,246,0.12); color: var(--purple); }
.kpi-badge-pink   { background: rgba(236,72,153,0.12); color: var(--pink); }
/* ── BAR COMPARE ───────────────────────────────────────── */
.bar-compare { display: flex; flex-direction: column; gap: 8px; }
.bar-compare-row { display: flex; align-items: center; gap: 8px; }
.bar-compare-tag { font-size: 10px; color: var(--muted); width: 30px; flex-shrink: 0; text-align: right; font-family: var(--mono); line-height: 1.3; }
.bar-compare-track { flex: 1; height: 12px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-compare-fill { height: 100%; border-radius: 3px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.bar-compare-val { font-size: 12px; font-weight: 600; font-family: var(--mono); width: 56px; flex-shrink: 0; color: var(--text); }
/* ── PROGRESS BAR ──────────────────────────────────────── */
.prog-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
/* ── DONUT ─────────────────────────────────────────────── */
.kpi-donut { display: flex; flex-direction: column; align-items: center; }
.donut-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin: 6px 0; }
.donut-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.donut-legend { display: flex; gap: 10px; font-size: 10px; color: var(--muted); margin-top: 6px; }
.donut-legend i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 3px; }
/* ── TABLES ────────────────────────────────────────────── */
.table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { background: var(--bg3); border-bottom: 1px solid var(--border); }
th { padding: 8px 14px; font-size: 11px; font-weight: 500; color: var(--muted); text-align: left; white-space: nowrap; }
th.num { text-align: right; }
td { padding: 7px 14px; border-top: 1px solid var(--border); color: var(--text); }
td.num { text-align: right; font-family: var(--mono); font-size: 12px; }
td.fw { font-weight: 600; }
td.muted { color: var(--muted); }
td.pos { color: var(--green); font-weight: 600; }
td.neg { color: var(--red); font-weight: 600; }
tr.row-target { background: rgba(56,189,248,0.05); }
tr.row-current { background: rgba(245,158,11,0.07); }
tfoot .tfoot-row { background: var(--bg3); border-top: 1px solid var(--border2); }
.sc-note { font-size: 10px; color: var(--muted); font-weight: 400; }
.sc-current-tag { font-size: 10px; color: var(--amber); font-weight: 700; margin-left: 6px; }
.table-footer { padding: 8px 14px; font-size: 11px; color: var(--muted); background: var(--bg3); border-top: 1px solid var(--border); line-height: 1.7; }
/* ── PRODUCT BARS ──────────────────────────────────────── */
.prod-card { padding: 0; }
.prod-row { display: flex; align-items: center; padding: 11px 18px; border-top: 1px solid var(--border); gap: 12px; }
.prod-row:first-child { border-top: none; }
.prod-soldout { opacity: 0.4; }
.prod-name { width: 140px; flex-shrink: 0; font-size: 13px; font-weight: 500; }
.prod-bar-wrap { flex: 1; min-width: 0; }
.prod-bar-bg { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prod-bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.prod-qty { width: 64px; flex-shrink: 0; font-size: 12px; font-weight: 600; text-align: right; font-family: var(--mono); }
.prod-qty em { font-style: normal; font-weight: 400; color: var(--muted); }
.prod-badge { flex-shrink: 0; width: 38px; text-align: center; font-size: 10px; font-weight: 700; padding: 3px 0; border-radius: 4px; }
.badge-ok     { background: rgba(34,197,94,0.12);  color: var(--green); }
.badge-warn   { background: rgba(245,158,11,0.12); color: var(--amber); }
.badge-danger { background: rgba(239,68,68,0.12);  color: var(--red); }
.badge-soldout{ background: var(--bg3); color: var(--muted); }
/* ── STOCK GRID ────────────────────────────────────────── */
.stock-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
.stock-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem 1rem 0.9rem;
  border-top: 3px solid var(--stock-accent, var(--border2));
  position: relative;
}
.stock-expired { opacity: 0.45; }
.stock-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.stock-dday { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; font-family: var(--mono); line-height: 1; }
.stock-dday.red   { color: var(--red); }
.stock-dday.amber { color: var(--amber); }
.stock-dday.blue  { color: var(--blue); }
.stock-dday.green { color: var(--green); }
.stock-dday.muted { color: var(--muted); font-size: 20px; }
.stock-dday.gray  { color: var(--muted); font-size: 20px; }
.stock-tag-wrap { margin-top: 6px; }
.stock-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.stock-tag.red   { background: rgba(239,68,68,0.12);  color: var(--red); }
.stock-tag.amber { background: rgba(245,158,11,0.12); color: var(--amber); }
.stock-tag.blue  { background: rgba(59,130,246,0.12); color: var(--blue); }
.stock-tag.green { background: rgba(34,197,94,0.12);  color: var(--green); }
.stock-tag.muted, .stock-tag.gray { background: var(--bg3); color: var(--muted); }
.stock-divider { border-top: 1px dashed var(--border2); margin: 10px 0 8px; }
.stock-restock { font-size: 11px; color: var(--muted); line-height: 1.5; }
.stock-restock strong { color: var(--text); font-weight: 600; }
/* ── DEFERRED ──────────────────────────────────────────── */
.deferred-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.deferred-top { display: flex; align-items: flex-start; gap: 10px; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
